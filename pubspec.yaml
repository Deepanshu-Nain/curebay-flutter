name: curebay
description: CureBay — Offline-First AI Health Assistant for Rural ASHA Workers
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.1.0
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.1
  http: ^1.2.2
  
  # State Management
  provider: ^6.1.1
  
  # Auth / Security
  crypto: ^3.0.3
  shared_preferences: ^2.2.2
  uuid: ^4.2.1
  
  # Voice / Speech
  speech_to_text: ^6.6.2
  record: ^5.1.2
  permission_handler: ^11.1.0
  
  # Image
  image_picker: ^1.0.4
  
  # LLM — runs MedGemma GGUF on-device via llama.cpp FFI
  llama_cpp_dart: ^0.3.5
  
  # ML — EfficientNet image classification on-device
  tflite_flutter: ^0.10.4
  onnxruntime: ^1.19.0
  image: ^4.1.7
  camera: ^0.10.6
  fft: ^0.0.1
  
  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/disease_kb/
    - assets/chroma_data/
    - assets/database/
